name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Generate Prisma client
        run: npx prisma generate --schema db/schema.prisma
      - name: Type check API
        run: npx tsc --noEmit -p apps/api/tsconfig.json
      - name: Type check Web
        run: npx tsc --noEmit -p apps/web/tsconfig.json

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: influencer_manager_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/influencer_manager_test
      NODE_ENV: test
      JWT_SECRET: test-ci-secret-that-is-long-enough
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Generate Prisma client
        run: npx prisma generate --schema db/schema.prisma
      - name: Run migrations
        run: npx prisma migrate deploy --schema db/schema.prisma
      - name: Run API tests
        run: npm test --workspace @influencer-manager/api

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Generate Prisma client
        run: npx prisma generate --schema db/schema.prisma
      - name: Run web tests
        run: npm test --workspace @influencer-manager/web

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-api, test-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Generate Prisma client
        run: npx prisma generate --schema db/schema.prisma
      - name: Build web
        run: npx vite build --config apps/web/vite.config.ts apps/web

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Check for critical/high vulnerabilities
        run: npm audit --audit-level=critical || true
